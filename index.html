<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For You ❤️</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="matrix"></canvas>
  <div class="start-screen" id="startScreen">
    <h1>У меня есть кое что для тебя </h1>
    <button id="startButton">Открыть</button>
  </div>
  <div class="message hidden" id="message">
    <h1>I LOVE YOU ❤️</h1>
    <p>Ты самый прекрасный цветок в моей жизни. Спасибо, что ты есть.</p>
  </div>
  <div class="gallery hidden" id="gallery">
    <img src="photos/1.jpg" alt="Фото 1">
    <img src="photos/2.jpg" alt="Фото 2">
    <img src="photos/3.jpg" alt="Фото 3">
    <img src="photos/4.jpg" alt="Фото 4">
    <img src="photos/5.jpg" alt="Фото 5">
    <img src="photos/6.jpg" alt="Фото 6">
    <img src="photos/7.jpg" alt="Фото 7">
    <img src="photos/8.jpg" alt="Фото 8">
  </div>
  <div class="heart hidden" id="heart"></div>
  <audio id="music" loop>
    <source src="music.mp3" type="audio/mpeg">
    Ваш браузер не поддерживает аудио.
  </audio>
  <script src="script.js"></script>
</body>
</html>
